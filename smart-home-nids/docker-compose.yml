version: "3.9"

services:
  nids-dashboard:
    build: .
    container_name: smart-home-nids
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./reports:/app/reports
      - ./plots:/app/plots
      - nids-db:/app/db
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  nids-db:
